<!doctype html>
<html
  lang="en"
  data-theme-template="native"
  data-terminal-theme="night-owl"
  data-theme-mode="dark"
  class="dark"
>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vybz</title>
    <script>
      (() => {
        const defaults = {
          themeMode: "dark",
          themeTemplate: "native",
          terminalTheme: "night-owl",
        };

        try {
          const raw = window.localStorage.getItem("vybz.theme");
          const parsed = raw ? JSON.parse(raw) : null;
          const themeMode =
            parsed?.themeMode === "system" ||
            parsed?.themeMode === "light" ||
            parsed?.themeMode === "dark"
              ? parsed.themeMode
              : defaults.themeMode;
          const themeTemplate =
            parsed?.themeTemplate === "native" ||
            parsed?.themeTemplate === "amber" ||
            parsed?.themeTemplate === "t3chat" ||
            parsed?.themeTemplate === "solar-dusk" ||
            parsed?.themeTemplate === "synthwave"
              ? parsed.themeTemplate
              : defaults.themeTemplate;
          const terminalTheme =
            parsed?.terminalTheme === "ayu" ||
            parsed?.terminalTheme === "night-owl" ||
            parsed?.terminalTheme === "solarized-light" ||
            parsed?.terminalTheme === "solarized-dark" ||
            parsed?.terminalTheme === "tokyo-night" ||
            parsed?.terminalTheme === "synthwave"
              ? parsed.terminalTheme
              : defaults.terminalTheme;
          const prefersDark =
            themeMode === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
              : themeMode === "dark";
          const resolvedMode = prefersDark ? "dark" : "light";
          const root = document.documentElement;

          root.dataset.themeTemplate = themeTemplate;
          root.dataset.terminalTheme = terminalTheme;
          root.dataset.themeMode = resolvedMode;
          root.classList.toggle("dark", resolvedMode === "dark");
          root.style.colorScheme = resolvedMode;
        } catch {
          // Ignore bootstrap theme failures and let the app hydrate normally.
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
